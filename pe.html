<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ticker Indicadores Perú (BCRP)</title>
<style>
  :root{
    --alto: 40px;          /* Altura visible del ticker */
    --velocidad: 35s;      /* Duración del loop (↑ más lento) */
    --padX: 24px;          /* Separación entre items */
    --bg: #0b1220;         /* Fondo */
    --fg: #e6edf6;         /* Texto principal */
    --muted: #9fb0c7;      /* Texto secundario */
    --accent: #7cc4ff;     /* Acento */
  }
  html,body{margin:0;padding:0;background:transparent}
  body{font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif}
  .ticker-wrap{position:relative;width:100%;height:var(--alto);overflow:hidden;background:var(--bg);color:var(--fg)}
  .ticker-wrap::before,.ticker-wrap::after{content:"";position:absolute;left:0;right:0;height:8px;pointer-events:none}
  .ticker-wrap::before{top:0;background:linear-gradient(to bottom, rgba(0,0,0,.25), rgba(0,0,0,0))}
  .ticker-wrap::after{bottom:0;background:linear-gradient(to top, rgba(0,0,0,.25), rgba(0,0,0,0))}
  .ticker{position:absolute;display:flex;gap:var(--padX);white-space:nowrap;will-change:transform;align-items:center;height:100%;animation:scroll var(--velocidad) linear infinite}
  .ticker>.group{display:flex;gap:var(--padX);align-items:center}
  .item{display:flex;align-items:baseline;gap:10px;line-height:1;padding:0 6px}
  .label{font-weight:600;letter-spacing:.2px;color:var(--muted);text-transform:uppercase;font-size:12px}
  .value{font-variant-numeric:tabular-nums;font-weight:700;font-size:16px}
  .delta{font-size:12px;padding:2px 6px;border-radius:999px;background:rgba(124,196,255,.12);color:var(--accent)}
  .sep{opacity:.2;font-size:14px}
  @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  @media (max-width:480px){:root{--alto:36px;--padX:16px}.value{font-size:14px}.label{font-size:11px}}
</style>
</head>
<body>
  <div class="ticker-wrap" role="region" aria-label="Indicadores económicos de Perú">
    <div id="ticker" class="ticker" aria-live="polite"></div>
  </div>

<script>
(async function(){
  /*
    Fuentes:
    1) USD/PEN y EUR/PEN: open.er-api.com (CORS habilitado, igual que py.html)
    2) IPC mensual, IPC 12M, TPM: BCRP vía allorigins.win (proxy CORS)
       La API del BCRP retorna: { periods:[{ name:"Feb.2026", values:[...] }] }
       Orden de códigos (alfabético): PD04722MM=0(TPM), PN01271PM=1(IPC-m), PN01273PM=2(IPC-12M)
  */
  const BCRP_CODES = 'PD04722MM-PN01271PM-PN01273PM';
  const BIDX = { tpm:0, ipcm:1, ipcy:2 };

  const P = new URLSearchParams(location.search);
  const alto   = P.get('alto');    if(alto)   document.documentElement.style.setProperty('--alto', `${parseInt(alto,10)}px`);
  const bg     = P.get('bg');      if(bg)     document.documentElement.style.setProperty('--bg', bg);
  const fg     = P.get('fg');      if(fg)     document.documentElement.style.setProperty('--fg', fg);
  const muted  = P.get('muted');   if(muted)  document.documentElement.style.setProperty('--muted', muted);
  const accent = P.get('accent');  if(accent) document.documentElement.style.setProperty('--accent', accent);

  function fmtPEN(n){
    const num = Number(n);
    try { return num.toLocaleString('es-PE', { style:'currency', currency:'PEN', maximumFractionDigits:4 }); }
    catch{ return `S/ ${num.toFixed(4)}`.replace('.',','); }
  }
  function fmtPct(n){
    const num = Number(n);
    if (!isFinite(num)) return '';
    return (num.toFixed(2).replace('.',',')) + '%';
  }

  // Parsea el formato de período del BCRP: "Feb.2026", "Ene.2025", etc.
  function dateStr(d){
    if(!d) return '';
    const MESES = { Ene:0,Feb:1,Mar:2,Abr:3,May:4,Jun:5,Jul:6,Ago:7,Sep:8,Oct:9,Nov:10,Dic:11 };
    // Formato BCRP: "Feb.2026"
    const m = String(d).match(/^([A-Za-z]{3})\.(\d{4})$/);
    if(m){
      const mon = MESES[m[1]];
      if(mon !== undefined) return new Date(parseInt(m[2]), mon, 1).toLocaleDateString('es-PE');
    }
    // Fallback: intento directo con Date
    try{
      const dt = new Date(d);
      if(!isNaN(dt)) return dt.toLocaleDateString('es-PE');
    }catch(e){}
    return String(d);
  }

  function val(values, idx){
    const v = Number(values?.[idx]);
    return isFinite(v) ? v : null;
  }

  function buildRows(rates, bcrp){
    const rows = [];
    if(rates){
      if(rates.usd != null) rows.push({ label:'USD/PEN', value: fmtPEN(rates.usd.valor), delta: dateStr(rates.usd.fecha) });
      if(rates.eur != null) rows.push({ label:'EUR/PEN', value: fmtPEN(rates.eur.valor), delta: dateStr(rates.eur.fecha) });
    }
    if(bcrp){
      const f = dateStr(bcrp.periodo);
      if(bcrp.ipcm != null) rows.push({ label:'IPC',     value: fmtPct(bcrp.ipcm), delta: f });
      if(bcrp.ipcy != null) rows.push({ label:'IPC 12M', value: fmtPct(bcrp.ipcy), delta: f });
      if(bcrp.tpm  != null) rows.push({ label:'TPM',     value: fmtPct(bcrp.tpm),  delta: f });
    }
    return rows;
  }

  function renderTicker(rows){
    const ticker = document.getElementById('ticker');
    function groupHTML(){
      return `
        <div class="group">
          ${rows.map((it,i)=>`
            <div class="item" aria-label="${it.label} ${it.value}">
              <span class="label">${it.label}</span>
              <span class="value">${it.value}</span>
              ${it.delta ? `<span class="delta">${it.delta}</span>` : ``}
            </div>
            ${i < rows.length-1 ? `<span class="sep">|</span>` : ``}
          `).join('')}
        </div>
      `;
    }
    ticker.innerHTML = groupHTML() + groupHTML();

    const totalWidth = ticker.scrollWidth / 2;
    const pxPerSec = P.get('pxs') ? Math.max(4, Number(P.get('pxs'))) : 10;
    const duration = Math.max(18, Math.round(totalWidth / pxPerSec));
    ticker.style.animationDuration = duration + 's';
  }

  const fallbackRows = [
    { label:'USD/PEN', value: fmtPEN(3.36), delta:'—' },
    { label:'EUR/PEN', value: fmtPEN(3.97), delta:'—' },
    { label:'IPC',     value: fmtPct(0.69), delta:'—' },
    { label:'IPC 12M', value: fmtPct(2.21), delta:'—' },
    { label:'TPM',     value: fmtPct(4.25), delta:'—' }
  ];

  // USD/PEN y EUR/PEN desde open.er-api.com (CORS habilitado)
  async function fetchRates(){
    const res  = await fetch('https://open.er-api.com/v6/latest/USD', { cache:'no-store' });
    if(!res.ok) throw new Error('er-api error');
    const j    = await res.json();
    const pen  = j.rates?.PEN;
    const eur  = j.rates?.EUR;
    const date = j.time_last_update_utc ? new Date(j.time_last_update_utc).toISOString().slice(0,10) : null;
    if(!pen || !eur) throw new Error('Sin PEN/EUR');
    return {
      usd: { valor: pen,       fecha: date },
      eur: { valor: pen / eur, fecha: date }   // EUR/PEN = (USD/PEN) / (EUR/USD)
    };
  }

  // IPC y TPM desde BCRP — directo al proxy (sabemos que la URL directa bloquea CORS)
  async function fetchBCRP(){
    const direct = `https://estadisticas.bcrp.gob.pe/estadisticas/series/api/${BCRP_CODES}/json`;
    const proxy  = `https://api.allorigins.win/raw?url=${encodeURIComponent(direct)}`;
    const res  = await fetch(proxy, { cache:'no-store' });
    if(!res.ok) throw new Error(`allorigins ${res.status}`);
    const json = await res.json();
    const data = typeof json?.contents === 'string' ? JSON.parse(json.contents) : json;
    if(!Array.isArray(data.periods) || !data.periods.length) throw new Error('Sin períodos BCRP');
    const last = data.periods[data.periods.length - 1];
    return {
      periodo: last.name,
      tpm:  val(last.values, BIDX.tpm),
      ipcm: val(last.values, BIDX.ipcm),
      ipcy: val(last.values, BIDX.ipcy),
    };
  }

  async function load(){
    // Mostrar fallback inmediatamente mientras cargan las APIs
    renderTicker(fallbackRows);

    let ratesData = null;
    let bcrpData  = null;

    // En cuanto llegan los tipos de cambio (rápido) → re-renderizar
    fetchRates()
      .then(r => { ratesData = r; renderTicker(buildRows(ratesData, bcrpData)); })
      .catch(e => console.warn('[PE] Tipos de cambio no disponibles:', e.message));

    // En cuanto llega el BCRP (proxy, más lento) → re-renderizar de nuevo
    fetchBCRP()
      .then(b => { bcrpData = b; renderTicker(buildRows(ratesData, bcrpData)); })
      .catch(e => console.warn('[PE] IPC/TPM no disponibles:', e.message));
  }

  await load();
  setInterval(load, 3 * 60 * 60 * 1000);
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) load(); });
})();
</script>
</body>
</html>
